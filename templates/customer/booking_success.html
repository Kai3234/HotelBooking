{% extends 'layout/base_customer.html' %} {% block content %}
<div style="text-align: center; padding: 100px 20px">
  <div
    style="
      width: 100px;
      height: 100px;
      background: #28a745;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      font-size: 3rem;
      box-shadow: 0 10px 20px rgba(40, 167, 69, 0.2);
    "
  >
    <i class="fa-solid fa-check"></i>
  </div>
  <h1 style="font-weight: 800; color: #222">ĐẶT PHÒNG THÀNH CÔNG!</h1>
  <p style="color: #666; font-size: 1.2rem; margin-bottom: 40px">
    Cảm ơn bạn đã tin tưởng Red Hotel. Lễ tân sẽ gọi điện xác nhận trong vòng 15
    phút.
  </p>

  <div style="display: flex; gap: 20px; justify-content: center">
    <a
      href="/"
      style="
        padding: 15px 35px;
        background: #333;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-weight: bold;
      "
      >Về trang chủ</a
    >
    <a
      href="/history"
      style="
        padding: 15px 35px;
        border: 2px solid #333;
        color: #333;
        text-decoration: none;
        border-radius: 10px;
        font-weight: bold;
      "
      >Xem lịch sử đặt</a
    >
  </div>
</div>
{% endblock %}
